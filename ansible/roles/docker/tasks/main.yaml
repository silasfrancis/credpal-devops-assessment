- name: Add Docker's official GPG key
  shell: |
          apt update
          apt install ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc

          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          apt update
  become: true

- name: Install the Docker packages
  shell:  apt install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  become: true

- name: Install required packages
  package:
    name:
      - unzip
      - curl
    state: present

- name: Download AWS CLI v2
  get_url:
    url: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
    dest: /tmp/awscliv2.zip
    mode: '0644'

- name: Unzip AWS CLI installer
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp/
    remote_src: yes

- name: Install AWS CLI
  command: /tmp/aws/install
  args:
    creates: /usr/local/bin/aws

- name: Verify AWS CLI installation
  command: aws --version
  register: aws_version
  changed_when: false

- name: Display AWS CLI version
  debug:
    msg: "{{ aws_version.stdout }}"

- name: Get DB secrets from AWS
  shell: aws secretsmanager get-secret-value --secret-id {{ aws_secret_id }} --query SecretString --output text
  register: db_secret

- name: Parse DB secrets
  set_fact:
    db_secrets: "{{ db_secret.stdout | from_json }}"

- name: Copy app files
  copy:
    src: "docker-compose.yaml"
    dest: ~/
    owner: ubuntu
    group: ubuntu
    mode: '0644'

- name: Run docker compose
  command: docker compose up -d 
  args:
    chdir: ~/
  environment:
    POSTGRES_USER: "{{ db_secrets.POSTGRES_USER }}"
    POSTGRES_PASSWORD: "{{ db_secrets.POSTGRES_PASSWORD }}"
    POSTGRES_DB: "{{ db_secrets.POSTGRES_DB }}"

- name: Wait for API to be up
  command: curl -sf http://127.0.0.1:3000/health
  register: api_check
  retries: 10
  delay: 5
  until: api_check.rc == 0