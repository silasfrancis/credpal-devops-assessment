name: Deploy Application on EC2

on:
  workflow_run:
    branches: [main]
    workflows: ["Provision AWS Resources with Terraform"]
    types: [completed]

jobs:
  check-previous-workflows-status:
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check both upstream workflows succeeded
        run: |
          SHA=${{ github.event.workflow_run.head_sha }}
          TERRAFORM_STATUS=$(gh run list \
            --workflow "Provision AWS Resources with Terraform" \
            --json headSha,conclusion \
            --jq ".[] | select(.headSha==\"$SHA\") | .conclusion" | head -n1)
          DOCKER_STATUS=$(gh run list \
            --workflow "Build, Scan and Push Images to Docker Hub" \
            --json headSha,conclusion \
            --jq ".[] | select(.headSha==\"$SHA\") | .conclusion" | head -n1)
          echo "Terraform: $TERRAFORM_STATUS | Docker: $DOCKER_STATUS"
          if [ "$TERRAFORM_STATUS" != "success" ] || [ "$DOCKER_STATUS" != "success" ]; then
            echo "One or both upstream workflows did not succeed, aborting!"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  deploy:
    runs-on: ubuntu-24.04
    needs: check-previous-workflows-status
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-2

      - name: Deploy via SSM
        id: ssm_deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ vars.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["bash /app/scripts/deploy.sh ${{ vars.BLUE_TG_ARN }} ${{ vars.GREEN_TG_ARN }} ${{ vars.LISTENER_ARN }}"]' \
            --region us-east-2 \
            --query 'Command.CommandId' \
            --output text)

          echo "Waiting for SSM command $COMMAND_ID to complete..."
          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id ${{ vars.EC2_INSTANCE_ID }} \
            --region us-east-2

          STATUS=$(aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ vars.EC2_INSTANCE_ID }} \
            --query 'StatusDetails' \
            --output text)

          echo "SSM command status: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            exit 1
          fi